<!DOCTYPE html>
<html>
<head>

<title>Add Patient</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h2>Add Patient</h2>

<form method="POST">

<input class="form-control mb-2"
name="fullname"
placeholder="Full Name"
required>

<input class="form-control mb-2"
type="date"
name="dob"
required>

<input class="form-control mb-2"
type="email"
name="email"
placeholder="Email"
required>

<input class="form-control mb-2"
type="number"
name="glucose"
placeholder="Glucose"
required>

<input class="form-control mb-2"
type="number"
name="haemoglobin"
placeholder="Haemoglobin"
required>

<input class="form-control mb-2"
type="number"
name="cholesterol"
placeholder="Cholesterol"
required>

<button class="btn btn-primary">
Submit
</button>

</form>

</div>

</body>
</html>
